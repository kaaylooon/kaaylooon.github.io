<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Modelo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --bg: #0d0d0d;
            --fg: #e6e6e6;
            --accent: #4da3ff;
            --card: #1a1a1a;
        }

        body {

			--tw-bg-opacity: 1;
			--tw-text-opacity: 1;
			-webkit-font-smoothing: antialiased;
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
            color: var(--fg);
  			overflow-x: hidden;
        }

        html{
        	-webkit-tap-highlight-color: transparent;
  			line-height: 1.5;
  			scroll-behavior: smooth;
        }

        header {
            padding: 20px 40px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }



        nav a {
            margin-left: 20px;
            color: var(--fg);
            text-decoration: none;
        }

        nav a:hover {
            color: var(--accent);
        }

        .hero {
            padding: 120px 40px;
            text-align: center;
            background: linear-gradient(180deg, #000 0%, #111 100%);
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            padding: 60px 40px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }
		.glass_card {
			background: rgba(255, 255, 255, 0.3);
 			backdrop-filter: blur(8px);
 			-webkit-backdrop-filter: blur(8px);
			border: 0.5px solid var(--COLOR3);
			border-radius: 10px;
		}
        .card h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .card:hover{

        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<header>
    <div class="logo"></div>
    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </nav>
</header>

<section class="hero">
    <h1 data-aos="zoom-out">KAYLON</h1>
    <p data-aos="fade-in">Lorem ipsum dolor sit amet consectetur, adipisicing elit.</p>
</section>

<section class="grid">
    <div class="card glass_card" data-aos="fade-up-left">
        <h2>Projetos</h2>
        <p>fdfgdfgdfgsdf.</p>
    </div>

    <div class="card glass_card" data-aos="fade-down-right">
        <h2>dfgsddfsgfsdg</h2>
        <p>Chfhfhfhd</p>
    </div>

    <div class="card" data-aos="fade-up-left">
        <h2>Bldsfgdoco</h2>
        <p>fgdfsggdsdf</p>
    </div>
    <div class="card" data-aos="fade-down-right">
        <h2>Blodsfgdfsgco</h2>
        <p>dfgsgsgsdg</p>
    </div>
</section>

<footer>
    © 2025
</footer>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
