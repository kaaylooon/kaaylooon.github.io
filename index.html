<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Modelo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #0d0d0d;
            --fg: #e6e6e6;
            --accent: #4da3ff;
            --card: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
            color: var(--fg);
        }

        header {
            padding: 20px 40px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        nav a {
            margin-left: 20px;
            color: var(--fg);
            text-decoration: none;
        }

        nav a:hover {
            color: var(--accent);
        }

        .hero {
            padding: 120px 40px;
            text-align: center;
            background: linear-gradient(180deg, #000 0%, #111 100%);
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            padding: 60px 40px;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">LOGO</div>
    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </nav>
</header>

<section class="hero">
    <h1>Modelo Base</h1>
    <p>Estrutura mínima para expandir conforme necessário.</p>
</section>

<section class="grid">
    <div class="card">
        <h2>Bloco 1</h2>
        <p>Conteúdo.</p>
    </div>

    <div class="card">
        <h2>Bloco 2</h2>
        <p>Conteúdo.</p>
    </div>

    <div class="card">
        <h2>Bloco 3</h2>
        <p>Conteúdo.</p>
    </div>
</section>

<footer>
    © Ano
</footer>

</body>
</html>
